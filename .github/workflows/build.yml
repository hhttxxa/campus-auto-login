name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build APK in kivy/buildozer container
        run: |
          docker run --rm \
            -v "$PWD:/home/user/hostcwd" \
            -e BUILDOZER_WARN="yes" \
            kivy/buildozer:latest \
            /bin/sh -c "cd /home/user/hostcwd && buildozer -v android debug"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: campuslogin-apk
          path: bin/*.apk
          if-no-files-found: error
