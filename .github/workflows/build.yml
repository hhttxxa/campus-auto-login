name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build APK in kivy/buildozer container
        env:
          BUILDOZER_WARN_ON_ROOT: "0"
        run: |
          docker run --rm \
            --entrypoint /bin/bash \
            -e BUILDOZER_WARN_ON_ROOT=0 \
            -v "$PWD:/home/user/hostcwd" \
            -w /home/user/hostcwd \
            kivy/buildozer:latest \
            -c "export BUILDOZER_WARN_ON_ROOT=0 && yes | buildozer -v android debug"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: campuslogin-apk
          path: bin/*.apk
          if-no-files-found: error
